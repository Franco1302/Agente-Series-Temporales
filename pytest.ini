[pytest]
asyncio_mode = auto
markers =
    integration: requiere la API drift-detection corriendo en DRIFT_API_URL
    llm: requiere un modelo Ollama local (no se ejecuta en CI sin GPU)
    slow: bateria lenta (varios minutos); solo a mano en el equipo de pruebas
    weight(n): peso del test en el scorecard agregado (default 1.0)
testpaths = tests
